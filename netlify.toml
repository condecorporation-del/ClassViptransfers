# Netlify Configuration for Frontend Deployment
# Frontend is located at the repository root

[build]
  # Build command - install dependencies and build
  command = "npm install && npm run build"
  
  # Publish directory - where Vite outputs the built files
  publish = "dist"

# Environment variables (set these in Netlify dashboard)
# VITE_API_BASE_URL should be set to your backend API URL
# Example: https://your-backend.onrender.com
# For local development, use: http://localhost:3001
# Netlify automatically provides COMMIT_REF and CONTEXT

[build.environment]
  NODE_VERSION = "18"
  VITE_API_BASE_URL = "https://los-cabos-luxe-transfers.onrender.com"

# Fix: Google indexed /transfers as home — redirect to canonical home
[[redirects]]
  from = "/transfers/"
  to = "/"
  status = 301
  force = false

# Redirect old zone URLs (Google indexed) to home
[[redirects]]
  from = "/san-jose-del-cabo"
  to = "/"
  status = 301
  force = true
[[redirects]]
  from = "/san-jose-del-cabo/"
  to = "/"
  status = 301
  force = true
[[redirects]]
  from = "/cabo-san-lucas"
  to = "/"
  status = 301
  force = true
[[redirects]]
  from = "/cabo-san-lucas/"
  to = "/"
  status = 301
  force = true

# Redirect rules for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Netlify Dev configuration
[dev]
  command = "npm run dev -- --port 8899 --host"
  targetPort = 8899
  port = 8899

